<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#4b120f">
<title>恵比寿屋食堂 クーポンスロット</title>
<style>
*{box-sizing:border-box}
:root{
  --red:#8b1e18;--dark:#270807;--gold:#f3c74f;--cream:#fff4d8;
  --ink:#32100d;--pink:#ff4f8b;--green:#1f9f65
}
html,body{margin:0;min-height:100%;font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif}
body{
  color:var(--cream);
  background:
    radial-gradient(circle at 50% 0%,rgba(255,192,77,.2),transparent 35%),
    repeating-linear-gradient(90deg,rgba(255,255,255,.025) 0 2px,transparent 2px 18px),
    linear-gradient(160deg,#57110e,var(--dark));
}
button{font:inherit}
.wrap{min-height:100vh;display:grid;place-items:center;padding:18px}
.machine{
  width:min(100%,440px);position:relative;overflow:hidden;
  border:4px solid var(--gold);border-radius:28px;padding:24px 16px 18px;
  background:linear-gradient(180deg,rgba(255,255,255,.06),transparent 22%),#4a100d;
  box-shadow:0 0 0 7px #240605,0 24px 60px rgba(0,0,0,.5),inset 0 0 35px rgba(243,199,79,.13)
}
.noren{display:flex;justify-content:center;gap:4px;margin:-24px -16px 15px}
.noren span{display:block;width:25%;height:46px;background:#a92720;border-bottom:4px solid #68100d;clip-path:polygon(0 0,100% 0,92% 100%,8% 100%)}
.badge{font-size:.78rem;letter-spacing:.2em;font-weight:900;color:var(--gold);text-align:center}
h1{margin:5px 0 2px;text-align:center;font-size:clamp(1.75rem,8vw,2.65rem);text-shadow:0 3px 0 #43100d}
.tagline{text-align:center;margin:8px 0 18px;opacity:.9}
.lanterns{display:flex;justify-content:space-between;position:absolute;left:12px;right:12px;top:72px;pointer-events:none}
.lantern{width:29px;height:44px;border-radius:44%;background:#e74631;border:2px solid #f3ad56;box-shadow:0 0 15px rgba(255,88,56,.55);display:grid;place-items:center;color:#3b0908;font-weight:900;font-size:.7rem}
.reelbox{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:13px;border:4px solid #9a5a0a;border-radius:18px;background:linear-gradient(#ffe697,#c88710);box-shadow:inset 0 0 12px rgba(0,0,0,.55),0 10px 24px rgba(0,0,0,.32)}
.reel{height:108px;display:grid;place-items:center;overflow:hidden;border:3px solid #4d2600;border-radius:10px;background:linear-gradient(90deg,rgba(0,0,0,.08),transparent 26%,transparent 74%,rgba(0,0,0,.08)),#fffaf0;color:#b21b22;font-size:clamp(2rem,10vw,3.15rem);font-weight:1000;text-shadow:0 2px 0 #ffd86e;box-shadow:inset 0 0 16px rgba(0,0,0,.18)}
.reel.spin{animation:jitter .08s linear infinite;filter:blur(.45px)}
@keyframes jitter{0%{transform:translateY(-3px)}50%{transform:translateY(3px)}100%{transform:translateY(-3px)}}
.stops{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:13px}
.stop,.start,.use,.demo{
  border:0;cursor:pointer;font-weight:1000;transition:.12s transform,.18s opacity
}
.stop:active,.start:active,.use:active,.demo:active{transform:translateY(2px) scale(.98)}
.stop{padding:12px 4px;border-radius:12px;color:#fff;background:linear-gradient(#ef554e,#a41612);box-shadow:0 5px 0 #5a0b09}
.stop:disabled{opacity:.32;cursor:not-allowed}
.start{width:100%;margin-top:18px;padding:17px;border-radius:999px;color:#3e2000;background:linear-gradient(#fff67d,#eaa514);box-shadow:0 7px 0 #8b5200,0 0 20px rgba(255,211,77,.35);font-size:1.18rem}
.start:disabled{opacity:.42;cursor:not-allowed}
.status{text-align:center;min-height:1.5em;margin:18px 0 7px;font-weight:900}
.panel{margin-top:14px;padding:18px 15px;border-radius:18px;text-align:center}
.coupon{position:relative;color:var(--ink);background:linear-gradient(135deg,#fff8cf,#ffd76a);border:3px dashed #b97800;box-shadow:0 0 26px rgba(255,213,93,.4)}
.coupon h2{margin:5px 0;font-size:2.25rem}
.coupon p{margin:7px 0}
.code{margin:13px auto;padding:10px;border:2px solid rgba(50,16,13,.3);border-radius:12px;background:rgba(255,255,255,.52)}
.code small{display:block}.code strong{font-size:1.28rem;letter-spacing:.12em}
.use{padding:11px 17px;border-radius:999px;color:#fff;background:#6a210d;margin-top:6px}
.lose{background:#f8d7df;color:#4d1421}
.lock{background:#fff0cf;color:#4d1c0c}
.demo{padding:11px 16px;border-radius:999px;background:#2c7c55;color:#fff;border:0}
.hidden{display:none!important}
.used{filter:grayscale(1);opacity:.58}
.used:after{content:"使用済み";position:absolute;left:50%;top:50%;transform:translate(-50%,-50%) rotate(-12deg);border:4px solid #a71919;color:#a71919;background:rgba(255,255,255,.75);padding:6px 14px;font-size:1.7rem;font-weight:1000}
.note{text-align:center;font-size:.73rem;opacity:.6;margin:16px 0 0}
.flash{animation:flash .12s 7 alternate}
@keyframes flash{from{filter:brightness(1)}to{filter:brightness(2.6)}}
#blackout{position:fixed;inset:0;z-index:99;background:#000;display:grid;place-items:center;opacity:0;pointer-events:none;transition:opacity .18s}
#blackout.show{opacity:1;pointer-events:auto}
#blackout .inner{text-align:center;opacity:0;transform:scale(.7)}
#blackout.reveal .inner{animation:reveal 1.4s forwards}
#blackout h2{font-size:clamp(2.6rem,14vw,5rem);margin:0;color:#fff4bd;text-shadow:0 0 18px #ffdf4e,0 0 42px #ff3a63}
#blackout p{font-size:1.2rem;font-weight:900}
@keyframes reveal{0%{opacity:0;transform:scale(.7)}40%{opacity:1;transform:scale(1.15)}100%{opacity:1;transform:scale(1)}}
.rainbow{animation:rainbow .55s linear infinite}
@keyframes rainbow{0%{filter:hue-rotate(0deg) brightness(1.2)}100%{filter:hue-rotate(360deg) brightness(1.2)}}
</style>
</head>
<body>
<div id="blackout"><div class="inner"><h2>大入り!!</h2><p>恵比寿屋食堂 プレミアム</p></div></div>

<main class="wrap">
<section class="machine" id="machine">
  <div class="noren"><span></span><span></span><span></span><span></span></div>
  <div class="lanterns"><div class="lantern">福</div><div class="lantern">福</div></div>
  <div class="badge">EBISUYA SHOKUDO</div>
  <h1>恵比寿屋食堂</h1>
  <p class="tagline">今日の運試し クーポンスロット</p>

  <section id="lockPanel" class="panel lock hidden">
    <h2>店内QRから挑戦！</h2>
    <p>恵比寿屋食堂に設置されたQRコードを読み込んで遊んでください。</p>
    <button id="demoBtn" class="demo">試作をテストする</button>
  </section>

  <section id="game">
    <div class="reelbox">
      <div class="reel" id="r0">🍜</div>
      <div class="reel" id="r1">🍚</div>
      <div class="reel" id="r2">🥟</div>
    </div>

    <div class="stops">
      <button class="stop" data-i="0" disabled>左を止める</button>
      <button class="stop" data-i="1" disabled>中を止める</button>
      <button class="stop" data-i="2" disabled>右を止める</button>
    </div>

    <button id="start" class="start">レバーON</button>
    <p id="status" class="status">1日1回、運試し！</p>

    <section id="coupon" class="panel coupon hidden">
      <div>🎊 COUPON GET 🎊</div>
      <h2 id="couponTitle">100円引き</h2>
      <p id="couponText">お会計から100円引き</p>
      <div class="code"><small>クーポン番号</small><strong id="couponCode">EBISU-0000</strong></div>
      <p>有効期限：本日限り</p>
      <button id="useBtn" class="use">店員さんが使用済みにする</button>
    </section>

    <section id="lose" class="panel lose hidden">
      <h2>ざんねん！</h2><p>また明日チャレンジしてね。</p>
    </section>
  </section>

  <p class="note">※同じ端末・ブラウザにつき1日1回。試作モードでは何度でも遊べます。</p>
</section>
</main>

<script>
const qs=new URLSearchParams(location.search);
const authorized=qs.get("shop")==="ebisuya";
const demo=qs.get("demo")==="1";
const lockPanel=document.getElementById("lockPanel");
const game=document.getElementById("game");
const machine=document.getElementById("machine");
const reels=[0,1,2].map(i=>document.getElementById("r"+i));
const stops=[...document.querySelectorAll(".stop")];
const start=document.getElementById("start");
const statusEl=document.getElementById("status");
const coupon=document.getElementById("coupon");
const lose=document.getElementById("lose");
const useBtn=document.getElementById("useBtn");
const blackout=document.getElementById("blackout");
const symbols=["🍜","🍚","🥟","🍺","福","7"];
let timers=[null,null,null],results=["","",""],nextStop=0,spinning=false,target=["","",""],premium=false;

function dayKey(){const d=new Date();return `${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`}
function randomCode(){return "EBISU-"+Math.random().toString(36).slice(2,7).toUpperCase()}
function tone(freq=440,dur=.08,vol=.04){
  try{
    const A=window.AudioContext||window.webkitAudioContext,c=new A(),o=c.createOscillator(),g=c.createGain();
    o.frequency.value=freq;g.gain.value=vol;o.connect(g);g.connect(c.destination);o.start();
    g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+dur);o.stop(c.currentTime+dur)
  }catch(e){}
}
function weightedOutcome(){
  const n=Math.random();
  if(n<.02){premium=true;return ["7","7","7"]}
  premium=false;
  if(n<.10)return ["🍜","🍜","🍜"];
  if(n<.20)return ["🥟","🥟","🥟"];
  if(n<.34)return ["🍚","🍚","🍚"];
  if(n<.50)return ["🍺","🍺","🍺"];
  let a,b,c;
  do{a=symbols[Math.floor(Math.random()*symbols.length)];b=symbols[Math.floor(Math.random()*symbols.length)];c=symbols[Math.floor(Math.random()*symbols.length)]}while(a===b&&b===c);
  return [a,b,c];
}
function startSpin(){
  if(spinning)return;
  coupon.classList.add("hidden");coupon.classList.remove("used");lose.classList.add("hidden");
  useBtn.disabled=false;useBtn.textContent="店員さんが使用済みにする";
  target=weightedOutcome();results=["","",""];nextStop=0;spinning=true;start.disabled=true;
  statusEl.textContent="左から順番に止めてね！";tone(220,.12,.05);
  reels.forEach((r,i)=>{r.classList.add("spin");timers[i]=setInterval(()=>r.textContent=symbols[Math.floor(Math.random()*symbols.length)],65+i*8)});
  stops.forEach((b,i)=>b.disabled=i!==0);
}
function stopReel(i){
  if(!spinning||i!==nextStop)return;
  clearInterval(timers[i]);reels[i].classList.remove("spin");reels[i].textContent=target[i];results[i]=target[i];tone(300+i*120,.07,.045);
  stops[i].disabled=true;nextStop++;
  if(nextStop<3){stops[nextStop].disabled=false;statusEl.textContent=nextStop===1?"次は真ん中！":"最後は右！"}
  else finish();
}
function showCoupon(title,text){
  document.getElementById("couponTitle").textContent=title;
  document.getElementById("couponText").textContent=text;
  document.getElementById("couponCode").textContent=randomCode();
  coupon.classList.remove("hidden");
}
function finish(){
  spinning=false;if(!demo)localStorage.setItem("ebisuyaPlayed",dayKey());
  const win=results[0]===results[1]&&results[1]===results[2];
  if(!win){statusEl.textContent="今回はハズレ！";lose.classList.remove("hidden");return}
  if(premium){
    statusEl.textContent="……";
    setTimeout(()=>{tone(80,.12,.08);blackout.classList.add("show")},400);
    setTimeout(()=>blackout.classList.add("reveal"),1200);
    setTimeout(()=>{blackout.classList.remove("show","reveal");machine.classList.add("rainbow");showCoupon("500円引き","お会計から500円引き");statusEl.textContent="プチュン！超大当たり！";navigator.vibrate?.([140,70,140,70,260]);tone(880,.35,.07)},2900);
    setTimeout(()=>machine.classList.remove("rainbow"),5200);
    return;
  }
  const s=results[0];
  const rewards={
    "🍜":["200円引き","お会計から200円引き"],
    "🥟":["餃子3個サービス","餃子を3個サービス"],
    "🍚":["ライス無料","ライス1杯無料"],
    "🍺":["ドリンク無料","対象ドリンク1杯無料"],
    "福":["100円引き","お会計から100円引き"]
  };
  const reward=rewards[s]||["100円引き","お会計から100円引き"];
  showCoupon(reward[0],reward[1]);statusEl.textContent="大当たり！クーポンGET！";machine.classList.add("flash");
  setTimeout(()=>machine.classList.remove("flash"),1200);navigator.vibrate?.([100,60,180]);tone(660,.22,.06)
}
stops.forEach(b=>b.onclick=()=>stopReel(Number(b.dataset.i)));
start.onclick=startSpin;
useBtn.onclick=()=>{coupon.classList.add("used");useBtn.disabled=true;useBtn.textContent="使用済み"};
document.getElementById("demoBtn").onclick=()=>location.href=location.pathname+"?demo=1";

if(!authorized&&!demo){game.classList.add("hidden");lockPanel.classList.remove("hidden")}
else if(!demo&&localStorage.getItem("ebisuyaPlayed")===dayKey()){start.disabled=true;statusEl.textContent="今日はすでにチャレンジ済みです"}
</script>
</body>
</html>
